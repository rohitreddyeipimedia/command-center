<title>EiPi Command Center</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<!-- Styles -->
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================================
     PIN Auth Screen
     ============================================================ -->
<div id="auth-screen" class="auth-screen hidden">
  <div class="logo-mark">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="EiPi Logo">
      <!-- Outer ring -->
      <circle cx="28" cy="28" r="24" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>
      <!-- Middle ring -->
      <circle cx="28" cy="28" r="16" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
      <!-- Core -->
      <circle cx="28" cy="28" r="6" fill="#00d4aa"/>
      <!-- Crosshair lines -->
      <line x1="28" y1="2" x2="28" y2="12" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
      <line x1="28" y1="44" x2="28" y2="54" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
      <line x1="2" y1="28" x2="12" y2="28" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
      <line x1="44" y1="28" x2="54" y2="28" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
      <!-- Diagonal accents -->
      <line x1="8" y1="8" x2="14" y2="14" stroke="#00d4aa" stroke-width="1" opacity="0.25"/>
      <line x1="42" y1="42" x2="48" y2="48" stroke="#00d4aa" stroke-width="1" opacity="0.25"/>
    </svg>
  </div>
  <h1 class="auth-title">EiPi Command Center</h1>
  <p class="auth-subtitle">Enter your PIN to access the dashboard</p>
  <div class="pin-input-group">
    <input type="password" id="pin-input" class="pin-input" placeholder="Enter PIN" maxlength="20" autocomplete="off">
    <button id="pin-submit" class="pin-submit">Unlock</button>
  </div>
</div>

<!-- ============================================================
     Main Application
     ============================================================ -->
<div id="app-main" class="hidden">
  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-mark">
          <svg width="36" height="36" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="EiPi Logo">
            <circle cx="28" cy="28" r="24" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>
            <circle cx="28" cy="28" r="16" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
            <circle cx="28" cy="28" r="6" fill="#00d4aa"/>
            <line x1="28" y1="2" x2="28" y2="12" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
            <line x1="28" y1="44" x2="28" y2="54" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
            <line x1="2" y1="28" x2="12" y2="28" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
            <line x1="44" y1="28" x2="54" y2="28" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
          </svg>
        </div>
        <div>
          <h1 class="header-title">EiPi Command Center</h1>
          <span class="header-tag">Live</span>
        </div>
      </div>
      <div class="header-right">
        <span id="realtime-dot" class="live-dot" title="Connecting..."></span>
        <div class="user-badge">
          <div class="user-avatar">R</div>
          <span>Rohit</span>
        </div>
        <button id="logout-btn" class="send-btn" style="font-size: 0.7rem; padding: 4px 10px; opacity: 0.6;">Logout</button>
      </div>
    </header>

    <!-- Agent Grid Section -->
    <section>
      <div class="section-header">
        <h2 class="section-title">Agents</h2>
        <span id="agent-count" class="agent-count">Loading...</span>
      </div>
      <div id="agent-grid" class="agent-grid">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- Activity Feed Section -->
    <section class="activity-section">
      <div class="section-header">
        <h2 class="section-title">Activity Feed</h2>
        <span class="agent-count" style="cursor: pointer;" onclick="loadActivityFeed()">↻ Refresh</span>
      </div>
      <div id="activity-feed" class="activity-feed">
        <div class="activity-empty">Loading activity...</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-left">EiPi Command Center v1.0 · Supabase Realtime</div>
      <div class="footer-right">
        <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">
          Created with Perplexity Computer
        </a>
      </div>
    </footer>

  </div>
</div>

<!-- ============================================================
     Message Panel Overlay
     ============================================================ -->
<div id="message-panel-overlay" class="message-panel-overlay">
  <div class="message-panel">
    <div class="panel-header">
      <div class="panel-agent-info">
        <span id="panel-agent-emoji" class="panel-agent-emoji">🤖</span>
        <div>
          <div id="panel-agent-name" class="panel-agent-name">Agent</div>
          <div id="panel-agent-status" class="panel-agent-status">idle</div>
        </div>
      </div>
      <button id="panel-close-btn" class="panel-close">✕</button>
    </div>
    <div id="messages-area" class="messages-area">
      <div class="messages-empty">
        <span class="messages-empty-icon">💬</span>
        <span>Select an agent to start messaging</span>
      </div>
    </div>
    <div id="sending-indicator" class="sending-indicator hidden" style="padding: 0 24px;">Sending...</div>
    <div class="message-input-area">
      <textarea id="message-textarea" class="message-textarea" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
      <button id="message-send-btn" class="message-send-btn" title="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
